<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    .card h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .card .title {
      font-size: 1rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .card .links {
      list-style: none;
      margin-bottom: 1.5rem;
    }

    .card .links li {
      margin-bottom: 0.5rem;
    }

    .card .links a {
      color: #0066cc;
      text-decoration: none;
      font-size: 1rem;
    }

    .card .links a:hover {
      text-decoration: underline;
    }

    .card .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .card .actions a {
      display: block;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
    }

    .card .actions .save-contact {
      background: #0066cc;
      color: #fff;
    }

    .card .actions .save-contact:hover {
      background: #0052a3;
    }

    .card .actions .exchange {
      background: #e9ecef;
      color: #1a1a1a;
    }

    .card .actions .exchange:hover {
      background: #dee2e6;
    }
  </style>
</head>
<body>
  <div class="card">
    {{ page.content }}
  </div>
</body>
</html>
